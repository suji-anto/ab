<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi UI Suji - Lokasi Aktif</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --bg-gradient: linear-gradient(180deg, #A8E6FF 0%, #FFFFFF 40%, #F2F5F9 100%);
            --quote-bg: #E1F5FE; 
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body {
            margin: 0; background: var(--bg-gradient);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .iphone-screen {
            width: 100%; max-width: 414px; position: relative; padding-bottom: 120px;
        }

        /* --- Header --- */
        .header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
        .user-name { font-size: 20px; font-weight: 800; color: #1c1c1e; }
        .avatar {
            width: 45px; height: 45px; background: #9d81ff; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        /* --- Card Presensi + Lokasi --- */
        .card {
            background: white; margin: 0 20px 20px; border-radius: 24px;
            padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .presensi-info { display: flex; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 12px; }
        .presensi-item { flex: 1; }
        .presensi-item strong { font-size: 22px; color: #1c1c1e; }

        .location-box {
            display: flex; align-items: center; gap: 8px;
            background: #f8f9fa; padding: 10px 14px; border-radius: 12px;
            font-size: 12px; color: #666; font-weight: 500;
      }
        .location-box svg { width: 14px; height: 14px; fill: var(--ios-blue); }

        /* --- Menu Grid --- */
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 0 20px; }
        .menu-item { text-align: center; font-size: 11px; font-weight: 700; color: #555; }
        .icon-box {
            aspect-ratio: 1/1; border-radius: 18px; display: flex;
            align-items: center; justify-content: center; margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .icon-box svg { width: 24px; height: 24px; fill: white; }

        /* --- Kata Mutiara (Jumbo) --- */
        .quote-card {
            margin: 30px 20px; background: var(--quote-bg);
            padding: 28px 22px; border-radius: 26px; color: #263238;
            font-style: italic; font-size: 17px; font-weight: 700; text-align: center;
            border: 2px solid #81D4FA; box-shadow: 0 6px 20px rgba(0,122,255,0.1);
        }

        /* --- Nav Bawah --- */
        .bottom-container {
            position: fixed; bottom: 0; width: 100%; max-width: 414px;
            background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border-top: 1px solid #eee;
        }
        .nav-bar { display: flex; justify-content: space-around; align-items: center; padding: 10px 0 25px; }
        .nav-item { text-align: center; font-size: 10px; color: #8E8E93; text-decoration: none; font-weight: 600; flex: 1; }
        .nav-item.active { color: var(--ios-blue); }
        .nav-item svg { width: 24px; height: 24px; display: block; margin: 0 auto 4px; fill: currentColor; }
        
        .camera-btn {
            width: 60px; height: 60px; background: var(--ios-blue);
            border-radius: 20px; margin-top: -45px; display: flex;
            align-items: center; justify-content: center; border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,122,255,0.3);
        }
        .camera-btn svg { fill: white; width: 28px; height: 28px; }

        .copyright { font-size: 10px; color: #bbb; text-align: center; padding-bottom: 10px; margin-top: -10px; }
    </style>
</head>
<body>

<div class="iphone-screen">

    <div class="header">
        <div><div style="color:#888; font-size:13px;">Assalamualaikum...</div><div class="user-name">SUJIANTO <small style="font-weight:400">(Owner II)</small></div></div>
        <div class="avatar">SJ</div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px; font-size:15px">Presensi hari ini</h3>
        <div class="presensi-info">
            <div class="presensi-item"><small style="color:#aaa">Datang</small><br><strong id="live-arrival">--:--:--</strong></div>
            <div class="presensi-item" style="text-align:right"><small style="color:#aaa">Pulang</small><br><strong style="color:#eee">—</strong></div>
        </div>
        
        <div class="location-box">
            <svg viewBox="0 0 24 24"><path d="M12,2C8.1,2,5,5.1,5,9c0,5.2,7,13,7,13s7-7.8,7-13C19,5.1,15.9,2,12,2z"/></svg>
            <span id="txt-lokasi">lot/lat</span>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><div class="icon-box" style="background:#FF9500;"><svg viewBox="0 0 24 24"><path d="M14,2H6C4.9,2,4,2.9,4,4v16c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V8L14,2z"/></svg></div>Tugas</div>
        <div class="menu-item"><div class="icon-box" style="background:#34C759;"><svg viewBox="0 0 24 24"><path d="M21,18v1c0,1.1-0.9,2-2,2H5c-1.1,0-2-0.9-2-2V5c0-1.1,0.9-2,2-2h14c1.1,0,2,0.9,2,2v1h-9z"/></svg></div>Saldo</div>
        <div class="menu-item"><div class="icon-box" style="background:#5856D6;"><svg viewBox="0 0 24 24"><path d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z"/></svg></div>Paypal</div>
        <div class="menu-item"><div class="icon-box" style="background:#FF2D55;"><svg viewBox="0 0 24 24"><path d="M20,6h-8l-2-2H4C2.9,4,2,4.9,2,6v12c0,1.1,0.9,2,2,2h16z"/></svg></div>Aset</div>
    </div>

    <div class="quote-card">"Jika Kita Memulai Karena Allah, Mengapa Harus Berhenti Karena Manusia?...Keep smile kakak"</div>

    <div class="bottom-container">
        <div class="nav-bar">
            <a class="nav-item active">Beranda</a>
            <a class="nav-item">Riwayat</a>
            <div class="camera-btn"></div>
            <a class="nav-item">Shift</a>
            <a class="nav-item">Akun</a>
        </div>
        <div class="copyright">@2026 Presensi Suji Ima Internusa KanPus Mgt</div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('live-arrival').innerText =
            String(now.getHours()).padStart(2, '0') + ":" +
            String(now.getMinutes()).padStart(2, '0') + ":" +
            String(now.getSeconds()).padStart(2, '0');
    }

    function getLocation() {
        const txt = document.getElementById('txt-lokasi');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude.toFixed(4);
                    const lon = pos.coords.longitude.toFixed(4);
                    txt.innerText = "Unroad Area hutan " + lat + "/" + lon;
                    txt.style.color = "#34C759";
                },
                () => {
                    txt.innerText = "Area Hutan Napis lot/lat";
                    txt.style.color = "#FF3B30";
                }
            );
        }
    }

    setInterval(updateClock, 1000);
    window.onload = () => {
        updateClock();
        getLocation();
    };
</script>
</body>
</html>
